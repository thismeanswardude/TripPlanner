<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Trip Planner</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <header class="header">
            <h1>Trip Planner</h1>

            <button id="themeToggle" class="theme-btn">
                Dark Mode
            </button>
        </header>

        <!-- FILTERS -->
        <section class="filters-section">

            <input
                type="text"
                id="searchInput"
                placeholder="Search activity..."
            >

            <input
                type="number"
                id="maxPrice"
                placeholder="Max price"
                min="0"
            >

            <select id="sortSelect">
                <option value="">Sort by</option>
                <option value="title">Title (A-Z)</option>
                <option value="priceLow">Price (Low → High)</option>
                <option value="priceHigh">Price (High → Low)</option>
            </select>

        </section>

        <main class="main-layout">

            <!-- LEFT SIDE -->
            <section class="activities-panel">

                <h2>Available Activities</h2>

                <div id="activitiesContainer">
                    <!-- activities render here -->
                </div>

            </section>

            <!-- RIGHT SIDE -->
            <section class="trip-panel">

                <h2>Your Trip</h2>

                <div class="days-container">

                    <div class="day-card">
                        <h3>Day 1</h3>

                        <div id="day1Activities"></div>

                        <p class="day-total">
                            Total:
                            <span id="day1Total">€0</span>
                        </p>
                    </div>

                    <div class="day-card">
                        <h3>Day 2</h3>

                        <div id="day2Activities"></div>

                        <p class="day-total">
                            Total:
                            <span id="day2Total">€0</span>
                        </p>
                    </div>

                    <div class="day-card">
                        <h3>Day 3</h3>

                        <div id="day3Activities"></div>

                        <p class="day-total">
                            Total:
                            <span id="day3Total">€0</span>
                        </p>
                    </div>

                </div>
            </section>

        </main>
    </div>

    <script type="module" src="./js/app.js"></script>

</body>
</html>
